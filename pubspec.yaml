name: taskflow
description: "A modern Task Management App (like Todoist or Trello) using Flutter. The app should allow users to manage tasks and projects efficiently while integrating AI features to improve user productivity and experience."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^20.0.0
  flutter_secure_storage: ^10.0.0
  easy_localization: ^3.0.8
  dio: ^5.9.1
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5
  path: ^1.9.1
  firebase_core: ^4.4.0
  firebase_ai: ^3.7.0
  rxdart: ^0.28.0
  flutter_riverpod: ^3.2.1
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  json_annotation: ^4.10.0
  freezed_annotation: ^3.1.0
  riverpod_annotation: ^4.0.2
  go_router: ^17.1.0
  flutter_svg: ^2.2.3
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.11.0
  json_serializable: ^6.12.0
  hive_ce_generator: ^1.10.0
  freezed: ^3.2.5
  riverpod_generator: ^4.0.3
  flutter_gen_runner: ^5.12.0

flutter_gen:
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/
  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/RubikVariableFont.ttf
